esphome:
  name: fan-controller
  friendly_name: fan-controller

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ZH0zemAhYtuvcyl4gij0rU2gfw0JLT1+u9wYYZKQXTg="

ota:
  - platform: esphome
    password: "df5813740288179cb65154bc93612fc8"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Fan-Controller Fallback Hotspot"
    password: "zdz70fpVsmIz"

captive_portal:

uart:
  id: mod_bus
  tx_pin: 27
  rx_pin: 32
  baud_rate: 4800
  data_bits: 8
  stop_bits: 1
  parity: NONE
  #debug: 

modbus:
  id: modbus1
  uart_id: mod_bus
  flow_control_pin: 33

modbus_controller:
  - id: qd
    address: 0x01
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 5s

switch:
  - platform: gpio
    name: "Fan 1"
    id: fan_1
    pin: 13

  - platform: gpio
    name: "Fan 2"
    id: fan_2
    pin: 17

  - platform: gpio
    name: "Fan 3"
    id: fan_3
    pin: 19

  - platform: gpio
    name: "Fan 4"
    id: fan_4
    pin: 22


sensor:

  - platform: modbus_controller
    modbus_controller_id: qd
    name: "Temp"
    id: modbus_temperature
    register_type: holding
    address: 0x0001
    unit_of_measurement: "C"
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: qd
    name: "Humidity"
    id: modbus_humidity
    register_type: holding
    address: 0x0000
    unit_of_measurement: "%"
    value_type: U_WORD
    filters:
      - multiply: 0.1
    # RPM Signal from Fan                                                                                                                                                                                                                  
  - platform: pulse_counter
    pin:
      number: 34
    name:  Fan 1 Speed
    id: fan_pulse_1
    unit_of_measurement: 'RPM'
    filters:
      - multiply: 0.2
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    update_interval: 12s

  - platform: pulse_counter
    pin:
      number: 35
    name:  Fan 2 Speed
    id: fan_pulse_2
    unit_of_measurement: 'RPM'
    filters:
      - multiply: 0.2
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    update_interval: 12s 

  - platform: pulse_counter
    pin:
      number: 37
    name:  Fan 3 Speed
    id: fan_pulse_3
    unit_of_measurement: 'RPM'
    filters:
      - multiply: 0.2
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    update_interval: 12s 

  - platform: pulse_counter
    pin:
      number: 39
    name:  Fan 4 Speed
    id: fan_pulse_4
    unit_of_measurement: 'RPM'
    filters:
      - multiply: 0.2
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    update_interval: 12s 


  
display:

  - platform: tm1637
    id: tm1637_display_1
    clk_pin:
      number: 23
    dio_pin: 
      number: 25
    inverted: false
    length: 4
    update_interval: 0.5s
    lambda: |-
      it.printf(0, "0123");

output:
  - platform: ledc
    id: pwm_output_1
    pin: 4
    frequency: 25000 Hz

  - platform: ledc
    id: pwm_output_2
    pin: 16
    frequency: 25000 Hz

  - platform: ledc
    id: pwm_output_3
    pin: 18
    frequency: 25000 Hz

  - platform: ledc
    id: pwm_output_4
    pin: 21
    frequency: 25000 Hz

fan:
  - platform: speed
    output: pwm_output_1
    name: "Fan 1 Speed"

  - platform: speed
    output: pwm_output_2
    name: "Fan 2 Speed"

  - platform: speed
    output: pwm_output_3
    name: "Fan 3 Speed"

  - platform: speed
    output: pwm_output_4
    name: "Fan 4 Speed"