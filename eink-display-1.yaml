esphome:
  name: eink-display-1
  friendly_name: eink-display-1

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "hWo6WuSn2wphBAjeGfVFKsTVcOaDQy7cVxUxtZO5nWU="

ota:
  - platform: esphome
    password: "1382a384733fd5531c779582dbfbaacc"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Eink-Display-1 Fallback Hotspot"
    password: "Vp8wOD8b0Dci"

captive_portal:

spi:
  clk_pin: 18
  mosi_pin: 23

font:
  - file: "gfonts://Roboto" # Downloads automatically from Google Fonts
    id: my_font
    size: 30

display:
  - platform: waveshare_epaper
    id: weact_display
    # Use the specific identifier for the GoodDisplay GDEY042T81
    model: gdey042t81
    cs_pin: GPIO5
    dc_pin: GPIO17
    reset_pin: GPIO16
    busy_pin: GPIO4
    update_interval: 60s
    # Optional: Set a full refresh interval to prevent ghosting
    full_update_every: 30
    lambda: |-
      it.print(0, 0, id(my_font), "Hello World!");
