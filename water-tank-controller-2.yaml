esphome:
  name: water-tank-controller-2
  friendly_name: water-tank-controller-2
  platformio_options:
    mode: quad
    board_build.arduino.memory_type: qio_qspi
    board_build.f_cpu: 80000000L 

# esp32:
#   board: esp32-s3-devkitc-1
#   variant: esp32s3
#   flash_size: 4MB
#   framework:
#     type: arduino

esp32:
  board: esp32dev
  framework:
    type: arduino

    
# Enable logging
logger:
  level: DEBUG
  hardware_uart: UART0

# Enable Home Assistant API
api:
  encryption:
    key: "WVZUB21WrU/92Sp5ukhxLgUKRBc8808IqiqLNIhvt9s="

ota:
  - platform: esphome
    password: "4b16ea5091bd7d1bcd0663ba0b4d7d8d"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Water-Tank-Controller-2"
    password: "FT5V3Ub9z1Ey"

captive_portal:

external_components:
  - source: github://KinDR007/VictronMPPT-ESPHOME@main

uart:
  id: uart_0
  tx_pin: 15  # Not used! The communication is read-only
  rx_pin: 25
  baud_rate: 19200
  rx_buffer_size: 256

victron:
  id: victron0
  uart_id: uart_0
  throttle: 30s

switch:
  - platform: gpio
    name: "Relay 1"
    id: relay_1
    pin: 18
    
  - platform: gpio
    name: "Pump"
    id: relay_2
    pin: 23
    on_turn_on:
      then:
        - switch.turn_on: led_2
    on_turn_off:
      then:
        - switch.turn_off: led_2

  - platform: gpio
    name: "LED"
    id: led_1
    pin: 19

  - platform: gpio
    name: "LED 2"
    id: led_2
    pin: 33

status_led:
  pin: 32

i2c:
  sda: 21
  scl: 22
  scan: true
  id: bus_a

sensor:
  - platform: ina219
    address: 0x40
    shunt_resistance: 0.1 ohm
    current:
      name: "Water Level Sensor Current"
      accuracy_decimals: 4
    power:
      name: "Water Level Sensor Power"
    bus_voltage:
      name: "Water Level Sensor Bus Voltage"
    shunt_voltage:
      name: "Water Level Sensor Shunt Voltage"
    max_voltage: 32.0V
    max_current: 3.2A
    update_interval: 30s

  - platform: victron
    victron_id: victron0
    panel_voltage:
      name: "Panel voltage"
    battery_voltage:
      id: battery_voltage
      name: "Battery voltage"
    battery_current:
      name: "Battery current"
    


