esphome:
  name: window-opener-1
  friendly_name: window-opener-1

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "67oweEVXLtChtEroHDTsAEpegn0TCVfxTHSpSXQa1VI="

ota:
  - platform: esphome
    password: "7f82e1f879fe671f96e19eaab3e0da5a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "window-opener Fallback Hotspot"
    password: "XpRScOk9vTiQ"

captive_portal:

number:
  - platform: template
    name: Stepper Control
    min_value: -10000
    max_value: 10000
    step: 100
    set_action:
      then:
        - stepper.set_target:
            id: stepper_motor
            target: !lambda 'return x;'
    
stepper:
  - platform: a4988
    id: stepper_motor
    dir_pin: 5
    step_pin: 4
    max_speed: 400 steps/s
    acceleration: 200
    deceleration: 200

    sleep_pin:
        number: 3
        inverted: true