esphome:
  name: aquarium-switch
  friendly_name: aquarium-switch

esp8266:
  board: esp01_1m

# Enable Home Assistant API
api:
  encryption:
    key: "SQ54zY9YNhMjq1I977JtfeWjVmweBXoB6Zn0h5uGz4M="

ota:
  - platform: esphome
    password: "35b224680a1c25844ddb4aa9336e75d9"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Aquarium-Switch Fallback Hotspot"
    password: "AQrh9rtO8IMT"

captive_portal:
  
switch:
  - platform: gpio
    name: "Relay"
    id: relay_1
    pin: 1

one_wire:
  - platform: gpio
    pin: 2
  
sensor:
  - platform: dallas_temp
    name: temperature
    update_interval: 120s

binary_sensor:
  - platform: gpio
    pin:
      number: 0
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Light button"
    device_class: light
    filters:
      - delayed_on: 10ms
    on_press:
         - switch.toggle: relay_1

logger:
  baud_rate: 0
  #level: NONE

