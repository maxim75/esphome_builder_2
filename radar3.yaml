esphome:
  name: radar3
  friendly_name: radar3
  on_boot:
      then:
        - delay: 10s
        - lambda: |-        
            ESP_LOGD("custom", "moving_distance %f", id(moving_distance).state);
            ESP_LOGD("custom", "ld2420_firmware >%s<", id(ld2420_firmware).state.c_str());

            if (isnan(id(moving_distance).state)) {
              ESP_LOGD("custom", "Yes empty");
              id(radarrestart).press();
            }

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    

  # framework:
  #   type: esp-idf
  #   version: recommended
  #   # Custom sdkconfig options
  #   sdkconfig_options:
  #     COMPILER_OPTIMIZATION_SIZE: y
  #   # Advanced tweaking options
  #   advanced:
  #     ignore_efuse_mac_crc: false

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "/Thaa7m0xYMavHqWwxke9NtxycSTgI7OZDDqm3dNKOo="

ota:
  password: "f47bcd535ebd8e3115398e88cdfd62fd"
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Radar3 Fallback Hotspot"
    password: "AOh2KZXvPIsQ"

captive_portal:

uart:
  rx_pin: GPIO03
  tx_pin: GPIO04
  id: ld2410_uart
  baud_rate: 115200
  parity: NONE
  stop_bits: 1

web_server:
  port: 80

ld2420:

text_sensor:
  - platform: ld2420
    fw_version:
      name: LD2420 Firmware
      id: ld2420_firmware

sensor:
  - platform: ld2420
    moving_distance:
      name : Moving Distance
      id: moving_distance

  - platform: internal_temperature
    name: "Internal Temperature"

binary_sensor:
  - platform: ld2420
    has_target:
      name: Presence
      id: presence_binary_sensor
      on_state:
        then:
          - if:
              condition: 
                binary_sensor.is_on: presence_binary_sensor
              then:
                - output.turn_on: gpio_7
              else:
                - output.turn_off: gpio_7
      # - if:
      #       condition:
      #         binary_sensor.is_on: presence_binary_sensor
      #       then:
      #         - output.turn_on: motion_led
      #         - delay: 500ms
      #         - output.turn_off: motion_led
      #         - delay: 500ms
      #   else:
      #     - output.turn_off: motion_led

select:
  - platform: ld2420
    operating_mode:
      name: Operating Mode

number:
  - platform: ld2420
    presence_timeout:
      name: Detection Presence Timeout
    min_gate_distance:
      name: Detection Gate Minimum
    max_gate_distance:
      name: Detection Gate Maximum
    # See "Number" section below for detail
    gate_select:
      name: Select Gate to Set
    still_threshold:
      name: Set Still Threshold Value
    move_threshold:
      name: Set Move Threshold Value

button:
  - platform: ld2420
    apply_config:
      name: Apply Config
    factory_reset:
      name: Factory Reset
    restart_module:
      name: Restart Module
      id: restart_module
    revert_config:
      name: Undo Edits

  - platform: restart
    name: "Radar Restart"
    id: radarrestart

output:
  - platform: ledc
    pin: GPIO7
    id: gpio_7

status_led:
  pin: GPIO10

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: false

