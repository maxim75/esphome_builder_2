esphome:
  name: "display-1"
  friendly_name: "display-1"
  on_boot:
    priority: -100.0 # Optional: Adjust priority if needed. Default runs after everything is set up.
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 50%

      # Example 1: Using a logger action within the on_boot trigger
      - logger.log: "ESPHome device has started!"

      # Example 2: Performing actions within a lambda
      - lambda: |-
          auto x = id(gw2000c_outdoor_temperature).state;
          char buffer[32];
            sprintf(buffer, "%.1f°C", x);

          lv_label_set_text(widget_outdoor_temperature, buffer);

esp32:
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin: # prevent screen flickering during OTA
      - light.turn_off:
          id: display_backlight
          transition_length: 0s
      - lambda: "id(display_backlight).loop();"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

switch:
  - platform: gpio
    name: Relay 1
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: Relay 2
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: Relay 3
    pin:
      number: GPIO1
      inverted: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: Backlight
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

sensor:
  - platform: homeassistant
    id: gw2000c_outdoor_temperature 
    entity_id: sensor.gw2000c_outdoor_temperature
    internal: true 
    on_value:
      then:
        - lvgl.label.update: 
            id: widget_outdoor_temperature
            text: !lambda |-
              char buffer[32];
              sprintf(buffer, "%.1f°C", x);
              return buffer;

  - platform: homeassistant
    id: office_air_sensor_office_temperature 
    entity_id: sensor.office_air_sensor_office_temperature
    internal: true 
    on_value:
      then:
        - lvgl.label.update: 
            id: widget_office_temperature 
            text: !lambda |-
              char buffer[32];
              sprintf(buffer, "%.1f°C", x);
              return buffer;

  - platform: homeassistant
    id: bus_sensor
    entity_id: sensor.bus
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: widget_bus
            text: !lambda |-
              char buffer[16];
              sprintf(buffer, "%.0f min", x);
              return std::string(buffer);

  - platform: homeassistant
    id: bus_delay
    entity_id: sensor.bus
    attribute: delay
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: widget_bus_delay
            text: !lambda |-
              char buffer[16];
              sprintf(buffer, "%.0f min", x);
              return std::string(buffer);

  # - platform: homeassistant
  #   id: bus_real_time
  #   entity_id: sensor.bus
  #   attribute: real_time
  #   internal: true
  #   on_value:
  #     then:
  #       - lvgl.label.update:
  #           id: widget_bus_real_time
  #           text: !lambda |-
  #             char buffer[16];
  #             sprintf(buffer, "= %.0f", x);
  #             return std::string(buffer);

text_sensor:
  - platform: homeassistant
    id: bus_real_time_text
    entity_id: sensor.bus
    attribute: real_time  
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: widget_bus_real_time
            text: !lambda |-
              return std::string(id(bus_real_time_text).state == "y" ? "Yes" : "No");

