font:
  - file: "gfonts://Roboto"
    id: roboto_32
    size: 32
    bpp: 4

  - file: "gfonts://Roboto@600"
    id: roboto_bold_48
    size: 48
    bpp: 4

  - file: "gfonts://Roboto+Mono@700"  # bold weight
    id: roboto_mono_bold_48
    size: 48
    bpp: 4

  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_icons_40
    size: 40
    bpp: 4
    glyphs:
      - "\U000F050E"  # mdi:thermometer
      - "\U000F0150"  # mdi:clock-outline
      - "\U000F000B"  # mdi:bus

display:
  - platform: st7701s
    id: tft_display
    dimensions:
      width: 480
      height: 480
    #    rotation: 270    #uncomment for placement with down-facing USB socket
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: False
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    pclk_frequency: 12MHz
    pclk_inverted: False
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: False
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10] # CMD2_BKSEL_BK0
      - [0xCD, 0x00] # disable MDT flag
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  - platform: gt911
    id: tft_touch
    display: tft_display
#    transform:     #uncomment for placement with down-facing USB socket
#      swap_xy: true
#      mirror_x: true

time:
  - platform: sntp
    id: sntp_time
    timezone: "Australia/Sydney"  # Change to your timezone
    on_time:
      - seconds: /1  # Every second
        then:
          - lvgl.label.update:
              id: widget_date_time_iso
              text: !lambda |-
                char buffer[9];
                auto now = id(sntp_time).now();
                sprintf(buffer, "%02d:%02d:%02d", now.hour, now.minute, now.second);
                return std::string(buffer);

