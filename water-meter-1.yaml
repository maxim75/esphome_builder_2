esphome:
  name: water-meter-1
  friendly_name: water-meter-1

esp8266:
  board: esp01_1m

i2c:
  - id: bus_a
    sda: GPIO2
    scl: GPIO0
    scan: True

sensor:
  - platform: vl53l0x
    name: "distance1"
    id: distance1
    address: 0x29
    timeout: 200us
    update_interval: 10s
    #enable_pin: GPIO1
    unit_of_measurement: "m"
    accuracy_decimals: 4

# Enable logging
logger:
  level: VERY_VERBOSE

# Enable Home Assistant API
api:
  encryption:
    key: "P9R7C3NfQvhGiWrGFZLSC63855lmmuOTwTZ6tGkzpYs="

ota:
  password: "302cad70e9352fd12b20c64b9223d158"
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Water-Meter-1 Fallback Hotspot"
    password: "IWae6lFBw5Aw"

