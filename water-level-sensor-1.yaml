substitutions:
  device_name: xiao-esp32s3
  friendly_name: water-level-sensor-1

esphome:
  name: water-level-sensor-1
  friendly_name: ${friendly_name}

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino          # or 'esp-idf' if preferred

# ── Logging ──────────────────────────────────────────────────
logger:
  level: INFO              # DEBUG | INFO | WARN | ERROR

# ── Wi-Fi ────────────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback hotspot if Wi-Fi fails
  ap:
    ssid: "${friendly_name} Fallback"
    password: "FT5V3Ub9z1Ey"

captive_portal:            # Serves config portal in AP mode

# ── OTA & API ────────────────────────────────────────────────
ota:
  - platform: esphome
    password: !secret ota_password

api:
  encryption:
    key: "WVZUB21WrU/92Sp5ukhxLgUKRBc8808IqiqLNIhvt9s="

# ── Web Server (optional — comment out to save RAM) ──────────
web_server:
  port: 80

# ── I²C Bus ──────────────────────────────────────────────────
# Default I²C pins on XIAO ESP32-S3:
#   SDA → D4 / GPIO5
#   SCL → D5 / GPIO6
i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true               # Logs detected I²C addresses at boot
  frequency: 400kHz

# ── SPI Bus ──────────────────────────────────────────────────
# Default SPI pins on XIAO ESP32-S3:
#   MOSI → D10 / GPIO9
#   MISO → D9  / GPIO8
#   CLK  → D8  / GPIO7
# spi:
#   mosi_pin: GPIO9
#   miso_pin: GPIO8
#   clk_pin: GPIO7

# ── UART ─────────────────────────────────────────────────────
# TX → D6 / GPIO43   RX → D7 / GPIO44
# uart:
#   tx_pin: GPIO43
#   rx_pin: GPIO44
#   baud_rate: 115200

output:
  - platform: ledc           # Hardware PWM — supports brightness control
    id: led_gpio21
    pin: GPIO21
    inverted: True
    frequency: 1000Hz        # 1 kHz PWM carrier; increase to 19531Hz to
                             # avoid flicker in video/camera applications

# ── Onboard RGB LED (WS2812, GPIO10) ─────────────────────────
light:
  - platform: monochromatic
    id: led21
    name: "${friendly_name} LED GPIO21"
    output: led_gpio21
    default_transition_length: 200ms
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1s
          update_interval: 2s
      - pulse:
          name: "Fast Pulse"
          transition_length: 250ms
          update_interval: 500ms
      - strobe:
          name: "Strobe"
          colors:
            - state: true
              brightness: 100%
              duration: 50ms
            - state: false
              duration: 50ms

# ── GPIO Pins ─────────────────────────────────────────────────
# XIAO ESP32-S3 Pinout (label → GPIO):
#   D0 → GPIO1    D1 → GPIO2    D2 → GPIO3
#   D3 → GPIO4    D4 → GPIO5    D5 → GPIO6
#   D6 → GPIO43   D7 → GPIO44   D8 → GPIO7
#   D9 → GPIO8    D10→ GPIO9
#   A0 → GPIO1    A1 → GPIO2    A2 → GPIO3
#   A3 → GPIO4    A4 → GPIO43   A5 → GPIO44

# Example: digital output on D0
binary_sensor:
  - platform: gpio
    name: "${friendly_name} Level 1"
    pin:
      number: GPIO1        # D0 
      inverted: true
    filters:
      - delayed_on: 10ms   # Debounce
      - delayed_off: 10ms
  - platform: gpio
    name: "${friendly_name} Level 2"
    pin:
      number: GPIO2        # D1
      inverted: true
    filters:
      - delayed_on: 10ms   # Debounce
      - delayed_off: 10ms
  - platform: gpio
    name: "${friendly_name} Level 3"
    pin:
      number: GPIO3        # D1
      inverted: true
    filters:
      - delayed_on: 10ms   # Debounce
      - delayed_off: 10ms
  - platform: gpio
    name: "${friendly_name} Level 4"
    pin:
      number: GPIO4        # D1
      inverted: true
    filters:
      - delayed_on: 10ms   # Debounce
      - delayed_off: 10ms
  - platform: gpio
    name: "${friendly_name} Level 5"
    pin:
      number: GPIO7        # D8
      inverted: true
    filters:
      - delayed_on: 10ms   # Debounce
      - delayed_off: 10ms
  

# ── ADC / Analog Inputs ───────────────────────────────────────
# ESP32-S3 ADC range: 0–3.3 V
# Avoid GPIO1/GPIO2 if Wi-Fi is active (ADC1 is more stable than ADC2)
sensor:
  # Internal temperature sensor
  - platform: internal_temperature
    name: "${friendly_name} CPU Temperature"
    update_interval: 60s

  # Wi-Fi signal strength
  - platform: wifi_signal
    name: "${friendly_name} RSSI"
    update_interval: 60s

  - platform: vl53l0x
    id: tof_distance
    name: "${friendly_name} Distance"
    address: 0x29
    update_interval: 1s
    long_range: true           # Enables ~2 m range; set false for < 60 cm
    timing_budget: 200000us    # 200 ms budget — good accuracy/speed balance
                               # Range: 20000–4294967295 µs
    unit_of_measurement: m
    accuracy_decimals: 3
    filters:
      - filter_out: nan        # Drop invalid/out-of-range readings
      - median:                # 5-sample median to smooth noise
          window_size: 5
          send_every: 5
          send_first_at: 1

# ── Time ─────────────────────────────────────────────────────
time:
  - platform: homeassistant
    id: ha_time

# ── Diagnostics ──────────────────────────────────────────────
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
    ssid:
      name: "${friendly_name} SSID"
    mac_address:
      name: "${friendly_name} MAC"

  - platform: version
    name: "${friendly_name} ESPHome Version"

# ── Status LED (drives RGB blue while connecting) ─────────────
# status_led:
#   pin:
#     number: GPIO10         # Reuses the WS2812 data pin for blink indicator
#                            # Remove if it conflicts with the neopixelbus above