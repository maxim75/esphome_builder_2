esphome:
  name: office-clock-2
  friendly_name: office-clock-2

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "HQQiFKsF8VG6Wp0hwb+bsGzHiAQkfaiTX0QNXqd4Pco="

ota:
  password: "3484aacc2625cddd332c095668cef45a"
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: "192.168.40.102" 

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Office-Clock-2 Fallback Hotspot"
    password: "zERrWn5jJgfU"

captive_portal:

time:

  - platform: homeassistant
    timezone: 'AEST-10AEDT,M10.1.0,M4.1.0/3'
    id: homeassistant_time

spi:
  clk_pin: 18
  mosi_pin: 23

number:
  - platform: template
    id: rotary_change_time
    name: Rotary change time
    min_value: 0
    max_value: 2147483647
    step: 1
    optimistic: True

sensor:
  - platform: homeassistant
    id: office_temperature_temperature
    entity_id: sensor.office_air_sensor_office_temperature
    name: "Office temperature"

  - platform: homeassistant
    id: outdoor_temperature_temperature
    entity_id: sensor.gw2000c_outdoor_temperature
    name: "Outdoor temperature"

  - platform: homeassistant
    id: outdoor_sensor_temperature_water
    entity_id: sensor.outdoor_sensor_temperature_water
    name: "Outdoor temperature"

  - platform: homeassistant
    id: gw2000c_uv_index
    entity_id: sensor.gw2000c_uv_index
    name: "uv_index"

  - platform: homeassistant
    id: office_air_sensor_office_co2
    entity_id: sensor.office_air_sensor_office_co2
    name: "office_air_sensor_office_co2"

  - platform: homeassistant
    id: office_air_sensor_particulate_matter_2_5_m_concentration
    entity_id: sensor.office_air_sensor_particulate_matter_2_5_m_concentration
    name: "office_air_sensor_particulate_matter_2_5_m_concentration"

  - platform: homeassistant
    id: p1s_01p00a3c2000188_remaining_time
    entity_id: sensor.p1s_01p00a3c2000188_remaining_time
    name: "print_remaining_time"

  - platform: homeassistant
    id: sg_total_active_power
    entity_id: sensor.sg10rt_a2430601767_total_active_power
    name: "sg_total_active_power"

  

  - platform: template
    name: "Rotary state updated"
    id: rotary_state_updated
    update_interval: 1s

  - platform: rotary_encoder
    name: "Rotary Encoder"
    id: rotary_encoder_1
    pin_a: 25
    pin_b: 26
    min_value: 2
    max_value: 50
    resolution: 2

display:
  - platform: max7219
    id: clock_display
    cs_pin: 5
    num_chips: 1
    lambda: |
      auto time = id(homeassistant_time).now();
      
      it.printf(2, "%d",  time.second%10);
      it.printf(3, "%d",  time.second/10);

      it.printf(4, "%d.",  time.minute%10);
      it.printf(5, "%d",  time.minute/10);

      it.printf(6, "%d.",  time.hour%10);
      it.printf(7, "%d",  time.hour/10);

  - platform: max7219
    id: second_display
    cs_pin: 32
    num_chips: 2
    lambda: |-
      int currTime = id(homeassistant_time).now().timestamp % 10000;
      auto changeTime = id(rotary_state_updated).state;
  
      //ESP_LOGD("custom", "%.1f", id(office_temperature_temperature).state);

      auto temp = id(office_temperature_temperature).state;
      auto tempOutdoor = id(outdoor_temperature_temperature).state;

      auto time_diff = (float)currTime-changeTime;
      ESP_LOGD("custom", "time_diff %f", time_diff);

      if(time_diff > 0 && time_diff < 5.0) {
        int rot_state = id(rotary_encoder_1).state;
        it.printf(4, "%d", rot_state/10);
        it.printf(3, "%d", rot_state%10);
      }
      else {
        //it.print(0, "012345");
        it.printf(0, "%-2.1f",  id(office_temperature_temperature).state);
        it.printf(5, "%2.1f",  id(outdoor_temperature_temperature).state);

        it.printf(8, "%-4.0f",  id(office_air_sensor_office_co2).state);
        it.printf(12, "%4.1f",  id(office_air_sensor_particulate_matter_2_5_m_concentration).state);
      }

  - platform: max7219
    id: third_display
    cs_pin: 13
    num_chips: 2
    lambda: |-
      it.printf(0, "%1.2f",  id(sg_total_active_power).state);
      it.printf(5, "%2.1f",  id(outdoor_sensor_temperature_water).state);

      ESP_LOGD("custom", "remaining_time %f", id(p1s_01p00a3c2000188_remaining_time).state);

      if (std::isnan(id(p1s_01p00a3c2000188_remaining_time).state)) {
        it.printf(8, "-");
        it.printf(9, "--");
      } else {
        int remaining = (int)id(p1s_01p00a3c2000188_remaining_time).state;
        it.printf(8, "%1d.", remaining / 60);
        it.printf(9, "%02d", remaining % 60);
      }
      it.printf(12, "%1.0f",  id(gw2000c_uv_index).state);

# Example configuration entry
