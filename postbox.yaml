esphome:
  name: postbox
  friendly_name: postbox
  on_boot:
    priority: -100
    then:
      - script.execute: deep_sleep_evaluation

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "UFgtGNAvjJRjO+pLhgRFdt3KhEfO3J2yT3wscmFug+c="

ota:
  password: "3b92e33bc737824ba5b85f17494e2c17"
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Postbox Fallback Hotspot"
    password: "C9utBK20zfOt"

captive_portal:

deep_sleep:
  id: deep_sleep_enabled
  sleep_duration: 15min

binary_sensor:
  - platform: homeassistant
    id: disable_deep_sleep
    entity_id: input_boolean.disable_deep_sleep

script:
  - id: deep_sleep_evaluation
    mode: queued
    then:
      - delay: 20s
      - if:
          condition:
            binary_sensor.is_on: disable_deep_sleep
          then:
            - logger.log: 'Deep Sleep Disabled'
          else:
            - deep_sleep.enter: deep_sleep_enabled
      - script.execute: deep_sleep_evaluation

i2c:
  - id: bus_a
    sda: 26
    scl: 27
    scan: True

sensor:  
  - platform: vl53l0x
    name: "Postbox distance"
    id: postbox_distance
    address: 0x29
    timeout: 200us
    update_interval: 10s
    unit_of_measurement: "m"
    accuracy_decimals: 4

  - platform: adc
    pin: 39
    id: postbox_battery_voltage
    name: "Postbox battery voltage"
    update_interval: 60s
    attenuation: 11db
    filters:
      - multiply: 2