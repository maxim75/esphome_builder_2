esphome:
  name: office-air-sensor
  friendly_name: office-air-sensor

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "Ovt91PTlSHkzfNQR+C1fJkgoI9Eg9GmHhUo30bxUGdA="

ota:
  password: "840d556e12f44ac72aa4ae3f3c97bb6c"
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: "192.168.40.101" 

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Office-Air-Sensor"
    password: "uHH1c8Q1GG3T"

captive_portal:

web_server:
  port: 80

uart:
  - id: "UART_2"
    rx_pin: 22
    tx_pin: 23
    baud_rate: 9600
  - id: "UART_3"
    rx_pin: 19
    tx_pin: 21
    baud_rate: 9600

sensor:
  - platform: sds011
    uart_id: "UART_2"
    pm_2_5:
      name: "Particulate Matter <2.5µm Concentration"
    pm_10_0:
      name: "Particulate Matter <10.0µm Concentration"
    update_interval: 5min

  - platform: mhz19
    uart_id: "UART_3"
    co2:
      id: office_co2
      name: "Office CO2"
    temperature:
      id: office_temperature
      name: "Office temperature"
    update_interval: 120s
    automatic_baseline_calibration: false

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

bluetooth_proxy:
  active: true
  connection_slots: 3

button:
  - platform: restart
    name: "Restart Node"
